<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0">
<title><?= SCHOOL_NAME ?></title>
<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:Arial,Helvetica,sans-serif}body{background:#f4f6f9}.header{background:linear-gradient(135deg,#8b5a3c,#a66a3f);color:#fff;text-align:center;padding:30px 20px}.header h1{font-size:26px;font-weight:700}.header p{margin-top:6px;font-size:14px;opacity:.95}.line{height:4px;background:#f2b705}.nav{background:#5a2a1a;display:flex;flex-wrap:wrap;justify-content:center}.nav a{color:#fff;text-decoration:none;padding:14px 18px;font-size:14px;font-weight:600}.nav a:hover{background:#f2b705;color:#5a2a1a}.container{max-width:1100px;margin:auto;padding:20px}.card,.box{background:#fff;border-radius:18px;padding:20px;box-shadow:0 6px 18px rgba(0,0,0,.08);border-left:10px solid #f2b705;position:relative}.card{margin-top:20px}.tag{background:#7a1f1f;color:#fff;padding:6px 12px;border-radius:20px;font-size:12px;display:inline-block;font-weight:bold}.date{position:absolute;right:20px;top:20px;font-size:13px;color:#555}.card h2{margin-top:15px;font-size:20px;color:#5a2a1a;line-height:1.3}.card p{margin-top:10px;font-size:14px;color:#333;line-height:1.6}.btn{margin-top:15px;display:inline-block;background:#f2b705;color:#5a2a1a;padding:10px 16px;border-radius:10px;font-weight:bold;text-decoration:none}h3{color:#5a2a1a;margin-top:25px;margin-bottom:15px;font-size:20px}.quick-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:15px}.box{text-align:center}.icon{font-size:28px;margin-bottom:10px}.box p{font-size:14px;color:#333;font-weight:600}.featured-card{padding:18px}.featured-layout{display:grid;grid-template-columns:340px 1fr;gap:20px;align-items:center}.post-image{width:100%;height:200px;object-fit:cover;border-radius:14px;background:#eee;display:block}.featured-content h2{margin-top:12px;font-size:22px}.date-inline{font-size:13px;color:#555;margin-left:10px}.latest-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:18px;margin-top:5px}.compact-card{background:#fff;border-radius:18px;padding:14px;box-shadow:0 6px 18px rgba(0,0,0,.08);border-left:10px solid #f2b705;display:flex;flex-direction:column;min-height:100%}.compact-card .post-image{height:145px;margin-bottom:12px}.tag-row{display:flex;align-items:center;justify-content:space-between;gap:8px;margin-bottom:8px}.compact-card .tag{font-size:10px;padding:5px 9px}.small-date{font-size:11px;color:#555}.compact-card h2{font-size:16px;color:#5a2a1a;line-height:1.25;margin:4px 0 0}.compact-card p{font-size:13px;color:#333;line-height:1.45;margin-top:8px;flex:1}.compact-card .btn{font-size:13px;padding:8px 12px}.section-title-row{margin-top:25px;margin-bottom:15px}.section-title-row h3{margin:0}.empty-card{color:#777;font-size:13px;line-height:1.5}@media(max-width:1000px){.latest-grid{grid-template-columns:repeat(2,1fr)}}@media(max-width:768px){.quick-grid{grid-template-columns:repeat(2,1fr)}.latest-grid{grid-template-columns:1fr}.nav a{padding:12px 10px;font-size:13px}.header h1{font-size:22px}.date{position:static;margin-top:10px}.featured-layout{display:block}.post-image{height:auto;aspect-ratio:16/9;margin:16px 0 4px}.date-inline{display:block;margin-left:0;margin-top:10px}.compact-card .post-image{height:180px}}
</style>
</head>
<body>
<div class="header"><h1><?= SCHOOL_NAME ?></h1><p><?= SCHOOL_TAGLINE ?></p></div><div class="line"></div>
<nav class="nav"><a href="<?= APP_URL ?>">Home</a><a href="<?= APP_URL ?>">Announcements</a><a href="<?= APP_URL ?>">News</a><a href="<?= APP_URL ?>">Events</a><a href="<?= APP_URL ?>">Calendar</a><a href="<?= APP_URL ?>">School Forms</a><a href="<?= APP_URL ?>">Gallery</a><a href="<?= APP_URL ?>">About</a><a href="<?= APP_URL ?>">Contact</a><a href="<?= APP_URL ?>?page=admin">Teacher Login</a></nav>
<div class="container">
<section id="latestSection" class="card featured-card"><div class="tag">Latest Update</div><h2>Loading latest post...</h2><p>Please wait while we retrieve the latest announcement.</p></section>
<h3>Quick Actions</h3><div class="quick-grid"><div class="box"><div class="icon">📞</div><p>Call School</p></div><div class="box"><div class="icon">📍</div><p>Google Maps</p></div><div class="box"><div class="icon">💬</div><p>Messenger</p></div><div class="box"><div class="icon">✉️</div><p>Email</p></div></div>
<div class="section-title-row"><h3>Latest Updates by Category</h3></div><div class="latest-grid"><div id="newsSection"></div><div id="eventsSection"></div><div id="remindersSection"></div><div id="advisorySection"></div></div>
</div>
<script>
const latestSection=document.getElementById("latestSection"),newsSection=document.getElementById("newsSection"),eventsSection=document.getElementById("eventsSection"),remindersSection=document.getElementById("remindersSection"),advisorySection=document.getElementById("advisorySection");
function esc(v){return String(v??"").replaceAll("&","&amp;").replaceAll("<","&lt;").replaceAll(">","&gt;").replaceAll('"',"&quot;").replaceAll("'","&#039;")}
function clean(v){return String(v??"").trim()}
function cat(t){const v=clean(t).toLowerCase();if(v==="news"||v==="latest news")return"news";if(["event","events","school event","school events"].includes(v))return"event";if(["reminder","reminders","important reminder","important reminders"].includes(v))return"reminder";if(["school advisory","school advisories","advisory","advisories","announcement","announcements","news advisory","news advisories"].includes(v))return"school advisory";return v}
function label(t){const c=cat(t);return c==="news"?"News":c==="event"?"Event":c==="reminder"?"Reminder":c==="school advisory"?"School Advisory":clean(t)||"Update"}
function parseT(v){if(!v)return 0;const r=String(v).trim();const d=new Date(r.replace(" ","T"));return isNaN(d.getTime())?0:d.getTime()}
function fmt(v){if(!v)return"";const r=String(v).trim();let d;if(/^\d{4}-\d{2}-\d{2}$/.test(r))d=new Date(r+"T00:00:00+08:00");else d=new Date(r.replace(" ","T"));return isNaN(d.getTime())?r:d.toLocaleDateString("en-PH",{year:"numeric",month:"short",day:"numeric"})}
function norm(p,i){const d=clean(p.date),cr=clean(p.created_at);return{id:clean(p.id)||"post-"+i,type:clean(p.type),category:cat(p.type),label:label(p.type),title:clean(p.title),message:clean(p.message),dateDisplay:fmt(d||cr),image:clean(p.image),sortTime:parseT(cr)||parseT(d)||0,rowOrder:Number(p.row_order||i)}}
function latest(p){const img=p.image?`<img src="${esc(p.image)}" alt="${esc(p.title)}" class="post-image">`:"";const dt=p.dateDisplay?`<span class="date-inline">${esc(p.dateDisplay)}</span>`:"";if(p.image){latestSection.innerHTML=`<div class="featured-layout">${img}<div class="featured-content"><div><span class="tag">${esc(p.label)}</span>${dt}</div><h2>${esc(p.title)}</h2><p>${esc(p.message)}</p><a href="#" class="btn">Read More</a></div></div>`;return}latestSection.innerHTML=`<div class="tag">${esc(p.label)}</div>${p.dateDisplay?`<div class="date">${esc(p.dateDisplay)}</div>`:""}<h2>${esc(p.title)}</h2><p>${esc(p.message)}</p><a href="#" class="btn">Read More</a>`}
function compact(p){const img=p.image?`<img src="${esc(p.image)}" alt="${esc(p.title)}" class="post-image">`:"";return`<article class="compact-card">${img}<div class="tag-row"><span class="tag">${esc(p.label)}</span>${p.dateDisplay?`<span class="small-date">${esc(p.dateDisplay)}</span>`:""}</div><h2>${esc(p.title)}</h2><p>${esc(p.message)}</p><a href="#" class="btn">Read More</a></article>`}
function empty(l){return`<article class="compact-card"><div class="empty-card">No ${esc(l)} posted yet.</div></article>`}
function by(posts,c,id){return posts.find(p=>p.category===c&&p.id!==id)||null}
function render(posts){if(!posts.length){latestSection.innerHTML=`<div class="tag">Latest Update</div><h2>No school updates yet.</h2><p>Published posts will appear here once available.</p>`;newsSection.innerHTML=empty("news");eventsSection.innerHTML=empty("events");remindersSection.innerHTML=empty("reminders");advisorySection.innerHTML=empty("school advisories");return}const top=posts[0];latest(top);newsSection.innerHTML=by(posts,"news",top.id)?compact(by(posts,"news",top.id)):empty("news");eventsSection.innerHTML=by(posts,"event",top.id)?compact(by(posts,"event",top.id)):empty("events");remindersSection.innerHTML=by(posts,"reminder",top.id)?compact(by(posts,"reminder",top.id)):empty("reminders");advisorySection.innerHTML=by(posts,"school advisory",top.id)?compact(by(posts,"school advisory",top.id)):empty("school advisories")}
google.script.run.withSuccessHandler(out=>{if(!out.success)throw new Error(out.message);const posts=(out.posts||[]).map(norm).filter(p=>p.title||p.message).sort((a,b)=>b.sortTime!==a.sortTime?b.sortTime-a.sortTime:b.rowOrder-a.rowOrder);render(posts)}).withFailureHandler(err=>{latestSection.innerHTML=`<div class="tag">Latest Update</div><h2>Unable to load posts</h2><p>${esc(err.message||"Please refresh the page.")}</p>`;newsSection.innerHTML=empty("news");eventsSection.innerHTML=empty("events");remindersSection.innerHTML=empty("reminders");advisorySection.innerHTML=empty("school advisories")}).apiGetPosts();
</script>
</body></html>
