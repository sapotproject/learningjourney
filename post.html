<head>

<title>Post | Learning Journey</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:Arial,Helvetica,sans-serif}
body{background:#f4f6f9}
.header{background:linear-gradient(135deg,#8b5a3c,#a66a3f);color:#fff;text-align:center;padding:30px 20px}
.header h1{font-size:26px}.header p{margin-top:6px;font-size:14px}.line{height:4px;background:#f2b705}
.nav{background:#5a2a1a;display:flex;flex-wrap:wrap;justify-content:center}
.nav a{color:#fff;text-decoration:none;padding:14px 18px;font-weight:600;font-size:14px}
.nav a:hover,.nav a.active{background:#f2b705;color:#5a2a1a}
.container{max-width:1100px;margin:auto;padding:20px}
.card{background:#fff;border-radius:18px;padding:20px;box-shadow:0 6px 18px rgba(0,0,0,.08);border-left:10px solid #f2b705;position:relative;margin-top:20px}
.tag{background:#7a1f1f;color:#fff;padding:6px 12px;border-radius:20px;font-size:12px;display:inline-block;font-weight:bold}
.date{position:absolute;right:20px;top:20px;font-size:13px;color:#555}
.card h2{margin-top:15px;font-size:22px;color:#5a2a1a;line-height:1.3}
.btn{margin-top:15px;display:inline-block;background:#f2b705;color:#5a2a1a;padding:10px 16px;border-radius:10px;font-weight:bold;text-decoration:none}
.post-image{width:100%;max-width:680px;height:260px;object-fit:cover;border-radius:16px;margin:18px auto 8px;background:#eee;display:block}
.message{margin-top:16px;font-size:15px;color:#333;line-height:1.7;white-space:pre-wrap}
@media(max-width:768px){
  .nav a{padding:12px 10px;font-size:13px}
  .header h1{font-size:22px}
  .date{position:static;margin-top:10px}
  .post-image{max-width:100%;height:200px}
}
</style>
</head>
