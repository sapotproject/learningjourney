<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Teacher Login | Learning Journey Child Growth Center, Inc.</title>

<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:Arial,Helvetica,sans-serif}
body{min-height:100vh;background:#f4f6f9;color:#2f261f}

.login-page{
  min-height:100vh;
  display:flex;
  align-items:center;
  justify-content:center;
  padding:24px;
  background:
    radial-gradient(circle at top left,rgba(242,183,5,.18),transparent 35%),
    linear-gradient(135deg,#5d341f 0%,#76492d 35%,#8b5a3c 68%,#a66a3f 100%);
}

.login-card{
  width:100%;
  max-width:430px;
  background:#fff;
  border-radius:22px;
  padding:30px 26px;
  box-shadow:0 18px 45px rgba(0,0,0,.22);
  text-align:center;
}

.school-logo{
  width:92px;
  height:92px;
  object-fit:contain;
  display:block;
  margin:0 auto 14px;
}

.login-card h1{
  color:#5a2a1a;
  font-size:26px;
  font-weight:700;
  line-height:1.25;
}

.subtitle{
  margin-top:6px;
  color:#6f6258;
  font-size:14px;
  line-height:1.5;
}

.home-link{
  display:inline-block;
  margin-top:14px;
  color:#7a1f1f;
  font-size:14px;
  font-weight:700;
  text-decoration:none;
}

.home-link:hover{text-decoration:underline}

.login-form{
  margin-top:24px;
  text-align:left;
}

.login-form label{
  display:block;
  margin-bottom:7px;
  font-size:14px;
  font-weight:700;
  color:#5a2a1a;
}

.login-form input{
  width:100%;
  border:1px solid #e8ded3;
  border-radius:12px;
  padding:12px 13px;
  font-size:15px;
  outline:none;
  background:#fff;
  margin-bottom:15px;
}

.login-form input:focus{
  border-color:#a66a3f;
  box-shadow:0 0 0 3px rgba(166,106,63,.16);
}

.login-form button{
  width:100%;
  border:none;
  border-radius:12px;
  background:#7a1f1f;
  color:#fff;
  padding:12px 16px;
  font-size:16px;
  font-weight:700;
  cursor:pointer;
  transition:.15s ease;
}

.login-form button:hover{background:#681818;transform:translateY(-1px)}
.login-form button:disabled{opacity:.65;cursor:not-allowed;transform:none}

.form-message{
  margin-top:14px;
  min-height:22px;
  font-size:14px;
  font-weight:700;
  text-align:center;
}

.form-message.success{color:#1f7a3f}
.form-message.error{color:#b42318}

.login-note{
  margin-top:18px;
  font-size:13px;
  color:#6f6258;
}

@media(max-width:480px){
  .login-card{padding:24px 20px;border-radius:18px}
  .school-logo{width:82px;height:82px}
  .login-card h1{font-size:22px}
}
</style>
</head>

<body>
<main class="login-page">
  <section class="login-card">

    <img src="assets/images/school-logo.png" alt="Learning Journey Child Growth Center Logo" class="school-logo">

    <h1>Teacher Login</h1>
    <p class="subtitle">Learning Journey Child Growth Center, Inc.</p>

    <a href="index.html" class="home-link">← Back to Home</a>

    <form id="loginForm" class="login-form">
      <label for="username">Username</label>
      <input type="text" id="username" name="username" autocomplete="username" required>

      <label for="password">Password</label>
      <input type="password" id="password" name="password" autocomplete="current-password" required>

      <button type="submit" id="loginBtn">Login</button>

      <p id="loginMessage" class="form-message" aria-live="polite"></p>
    </form>

    <p class="login-note">Authorized school personnel only.</p>

  </section>
</main>

<script src="assets/js/admin.js"></script>
</body>
</html>
