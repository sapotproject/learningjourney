<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Teacher Login | <?= SCHOOL_NAME ?></title>
<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:Arial,Helvetica,sans-serif}
body{background:#f4f6f9;min-height:100vh;color:#2f261f}
.header{background:linear-gradient(135deg,#5d341f 0%,#76492d 35%,#8b5a3c 68%,#a66a3f 100%);color:#fff;padding:24px 20px;box-shadow:0 3px 14px rgba(0,0,0,.15)}
.header-inner{max-width:900px;margin:auto;display:flex;align-items:center;justify-content:space-between;gap:18px}
.brand h1{font-size:22px;line-height:1.25}.brand p{margin-top:4px;font-size:14px;color:#ffe9a8}
.home-btn{background:#f2b705;color:#5a2a1a;border-radius:12px;padding:10px 14px;font-weight:700;font-size:14px;text-decoration:none}
.container{max-width:480px;margin:40px auto;padding:0 20px}
.card{background:#fff;border-radius:18px;padding:24px;box-shadow:0 6px 18px rgba(0,0,0,.08);border-left:10px solid #f2b705}
.card h2{color:#5a2a1a;font-size:24px;margin-bottom:8px}.card p{color:#6f6258;font-size:14px;line-height:1.5;margin-bottom:18px}
.form-row{margin-bottom:15px}.form-row label{display:block;margin-bottom:7px;font-size:14px;font-weight:700;color:#5a2a1a}
.form-row input{width:100%;border:1px solid #e8ded3;border-radius:12px;padding:12px 13px;font-size:15px;outline:none;background:#fff}
.form-row input:focus{border-color:#a66a3f;box-shadow:0 0 0 3px rgba(166,106,63,.16)}
.login-btn{width:100%;border:none;border-radius:12px;padding:12px 16px;font-size:15px;font-weight:700;cursor:pointer;background:#7a1f1f;color:#fff}
.message{margin-top:14px;min-height:22px;font-size:14px;font-weight:700}.message.success{color:#1f7a3f}.message.error{color:#b42318}
@media(max-width:600px){.header-inner{flex-direction:column;align-items:flex-start}.home-btn{width:100%;text-align:center}.brand h1{font-size:19px}}
</style>
</head>
<body>
<header class="header">
  <div class="header-inner">
    <div class="brand">
      <h1><?= SCHOOL_NAME ?></h1>
      <p>Teacher Login</p>
    </div>
    <a href="<?= APP_URL ?>" class="home-btn">← Back to Home</a>
  </div>
</header>

<main class="container">
  <section class="card">
    <h2>Teacher Login</h2>
    <p>Sign in to publish school announcements, news, events, reminders, and advisories.</p>

    <form id="loginForm">
      <div class="form-row">
        <label for="username">Username</label>
        <input type="text" id="username" autocomplete="username" required>
      </div>

      <div class="form-row">
        <label for="password">Password</label>
        <input type="password" id="password" autocomplete="current-password" required>
      </div>

      <button type="submit" class="login-btn" id="loginBtn">Login</button>
      <p id="loginMessage" class="message"></p>
    </form>
  </section>
</main>

<script>
const APP_URL = "<?= APP_URL ?>";
const loginForm = document.getElementById("loginForm");
const loginBtn = document.getElementById("loginBtn");
const loginMessage = document.getElementById("loginMessage");

function setMessage(text,type){
  loginMessage.textContent = text || "";
  loginMessage.className = "message";
  if(type) loginMessage.classList.add(type);
}

loginForm.addEventListener("submit", async function(event){
  event.preventDefault();

  const username = document.getElementById("username").value.trim();
  const password = document.getElementById("password").value;

  loginBtn.disabled = true;
  loginBtn.textContent = "Logging in...";
  setMessage("Checking account...", "");

  try{
    const formData = new URLSearchParams();
    formData.append("action","login");
    formData.append("username",username);
    formData.append("password",password);

    const response = await fetch(APP_URL,{method:"POST",body:formData});
    const result = await response.json();

    if(!result.success){
      setMessage(result.message || "Login failed.", "error");
      return;
    }

    sessionStorage.setItem("lj_logged_in","true");
    sessionStorage.setItem("lj_token",result.token);
    sessionStorage.setItem("lj_username",result.username || username);
    sessionStorage.setItem("lj_name",result.name || username);
    sessionStorage.setItem("lj_role",result.role || "teacher");

    setMessage("Login successful. Redirecting...", "success");
    window.location.href = APP_URL + "?page=dashboard";

  }catch(error){
    setMessage("Unable to login. Please try again.", "error");
  }finally{
    loginBtn.disabled = false;
    loginBtn.textContent = "Login";
  }
});
</script>
</body>
</html>
