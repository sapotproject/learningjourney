<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Learning Journey Teacher/Admin Dashboard</title>
  <link rel="stylesheet" href="/assets/css/style.css?v=clean-v2"/>
</head>
<body>
  <header class="admin-header">
    <div class="admin-header-inner">
      <div class="admin-brand">
        <h1>Learning Journey Teacher/Admin Dashboard</h1>
        <p>Manage school updates, announcements, and website settings.</p>
      </div>
      <div class="admin-actions">
        <a href="/" class="home-btn">Back to Home</a>
        <button id="logoutBtn" class="logout-btn hidden">Logout</button>
      </div>
    </div>
  </header>

  <main class="container">
    <section id="loginPanel" class="login-wrap">
      <form id="loginForm" class="card">
        <h2>Teacher Login</h2>
        <p>Sign in to manage school updates.</p>

        <div class="form-row">
          <label>Username</label>
          <input id="loginUsername" autocomplete="username" required>
        </div>

        <div class="form-row">
          <label>Password</label>
          <input id="loginPassword" type="password" autocomplete="current-password" required>
        </div>

        <button class="publish-btn login-submit-btn" type="submit">Login</button>
        <p id="loginMessage" class="form-message"></p>
      </form>
    </section>

    <section id="dashboardPanel" class="hidden">
      <section class="top-grid">
        <form id="postForm" class="card">
          <h3 id="postFormTitle">Create New Post</h3>

          <input type="hidden" id="postId">
          <input type="hidden" id="existingImageUrl">
          <input type="hidden" id="existingImageKey">

          <div class="form-row">
            <label>Post Type</label>
            <select id="postType" required>
              <option value="">Select type</option>
              <option>School Advisory</option>
              <option>News</option>
              <option>Event</option>
              <option>Reminder</option>
            </select>
          </div>

          <div class="form-row">
            <label>Date</label>
            <input id="postDate" type="date" required>
          </div>

          <div class="form-row">
            <label>Title</label>
            <input id="postTitle" required>
          </div>

          <div class="form-row">
            <label>Message</label>
            <textarea id="postMessageText" required></textarea>
          </div>

          <div class="form-row">
            <label>Image</label>
            <input id="postImage" type="file" accept="image/jpeg,image/png,image/webp,image/gif">
          </div>

          <div class="form-actions">
            <button class="publish-btn" type="submit" id="savePostBtn">Publish Post</button>
            <button class="clear-btn" type="button" id="clearPostBtn">Clear</button>
          </div>

          <p id="postMessage" class="form-message"></p>
        </form>

        <aside class="card">
          <h3>Live Preview</h3>
          <article id="postPreview" class="preview-box">
            <p class="preview-empty">Preview will appear here while you type.</p>
          </article>
        </aside>
      </section>

      <section class="bottom-grid">
        <div class="card">
          <div class="section-head">
            <h3>All Posts</h3>
            <button class="small-btn clear-btn" type="button" onclick="loadPosts()">Refresh</button>
          </div>
          <div id="allPosts" class="post-list"></div>
        </div>

        <div class="card">
          <h3>Recycle Bin</h3>
          <div id="recyclePosts" class="post-list"></div>
        </div>
      </section>

      <section class="card">
        <h3>Website Settings</h3>

        <form id="settingsForm" class="settings-grid">
          <div class="form-row">
            <label>School Name</label>
            <input id="set_school_name">
          </div>

          <div class="form-row">
            <label>Tagline</label>
            <input id="set_school_tagline">
          </div>

          <div class="form-row">
            <label>Phone</label>
            <input id="set_phone">
          </div>

          <div class="form-row">
            <label>Email</label>
            <input id="set_email">
          </div>

          <div class="form-row">
            <label>Messenger</label>
            <input id="set_messenger">
          </div>

          <div class="form-row">
            <label>Google Maps</label>
            <input id="set_google_maps">
          </div>

          <div class="form-row full-row">
            <label>Address</label>
            <input id="set_address">
          </div>

          <div class="form-row">
            <label>Office Hours</label>
            <input id="set_office_hours">
          </div>

          <div class="form-row">
            <label>School Logo</label>
            <div class="logo-upload-box">
              <img id="logoPreview" class="logo-preview hidden" src="" alt="School logo preview">
              <input id="set_logo_file" type="file" accept="image/jpeg,image/png,image/webp,image/gif">
              <input id="set_logo_url" type="hidden">
              <button id="uploadLogoBtn" class="small-btn edit-btn" type="button">Upload Logo</button>
              <p id="logoUploadMessage" class="mini-message"></p>
            </div>
          </div>

          <div class="form-actions full-row">
            <button class="publish-btn" type="submit">Save Settings</button>
          </div>

          <p id="settingsMessage" class="form-message full-row"></p>
        </form>
      </section>

      <section id="usersPanel" class="card">
        <h3>User Management</h3>

        <form id="userForm" class="user-form-grid">
          <div class="form-row">
            <label>Username</label>
            <input id="user_username">
          </div>

          <div class="form-row">
            <label>Name</label>
            <input id="user_name">
          </div>

          <div class="form-row">
            <label>Role</label>
            <select id="user_role">
              <option value="teacher">Teacher</option>
              <option value="admin">Admin</option>
            </select>
          </div>

          <div class="form-row">
            <label>Password</label>
            <input id="user_password" type="password" placeholder="Required for new user / reset only">
          </div>

          <div class="form-actions full-row">
            <button class="publish-btn" type="submit">Add User</button>
            <button class="clear-btn" type="button" onclick="loadUsers()">Refresh Users</button>
          </div>

          <p id="userMessage" class="form-message full-row"></p>
        </form>

        <div id="userList" class="user-list"></div>
      </section>
    </section>
  </main>

  <script src="/assets/js/admin.js?v=clean-v2"></script>
</body>
</html>
